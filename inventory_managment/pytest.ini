[pytest]
DJANGO_SETTINGS_MODULE = core.settings
python_files = tests.py test_*.py *_tests.py

addopts = 
    --strict-markers
    --no-migrations
    --reuse-db
    -v
    --cov=users
    --cov=core
    --cov=auditing
    --cov-report=term-missing
    --cov-fail-under=50

markers =
    unit: Isolated functional domain logic validation tests.
    integration: Database state mutation validation and transactional tracking tests.
    concurrency: High throughput race condition and row locking isolation tests.